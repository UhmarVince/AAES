name: Daily AAES Blog Generation

on:
  schedule:
    # Runs every 8 hours (Thrice a day)
    - cron: '0 */8 * * *'
  workflow_dispatch:
...

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Important: Allows the bot to push changes back to the repo

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Blog Generator
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python generate_blog.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "aaes-blog-bot"
          git config --global user.email "bot@aa-engineers.net"
          git add .
          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: automated daily blog update [skip ci]"
            git push https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:${{ github.ref_name }}
          fi
